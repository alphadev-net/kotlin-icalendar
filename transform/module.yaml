product:
    type: lib
    platforms: [jvm, js]

dependencies:
    - ../base: exported

settings:
  publishing:
    name: kotlin-icalendar-transformations
  kotlin:
    freeCompilerArgs:
      - -Xexplicit-api=warning
    optIns:
      - kotlin.time.ExperimentalTime
      - kotlin.uuid.ExperimentalUuidApi

apply:
  - ../publish.module-template.yaml