product:
  type: lib
  platforms: [jvm, android, iosArm64, iosSimulatorArm64, iosX64, js]

dependencies:
  - $libs.kotlinx.datetime: exported
  - $libs.kotlinx.io.core: exported

settings:
  publishing:
    name: kotlin-icalendar-base
  kotlin:
    freeCompilerArgs:
      - -Xexplicit-api=warning
    optIns:
      - kotlin.time.ExperimentalTime
      - kotlin.uuid.ExperimentalUuidApi

apply:
  - ../publish.module-template.yaml
